<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gallery | Azadamard Scouting</title>
  <meta name="description" content="Azadamard Scouting photo gallery: camp, weekly activities, field trips, and events." />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html#top">
        <img src="images/brand/logo.webp" class="logo" alt="Homenetmen Scouts Logo" />
        <span class="brand-text">
          <span class="brand-kicker">Homenetmen Pasadena</span>
          <span class="brand-title">Azadamard Scouting</span>
        </span>
      </a>

      <nav class="nav">
        <a href="index.html#about">About</a>
        <a href="gallery.html">Gallery</a>
        <a href="index.html#join">Join</a>
        <a href="index.html#community">Stay Connected</a>
        <a href="index.html#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div class="page-head">
        <div>
          <h1 style="margin:0 0 6px;">Gallery</h1>
          <div class="breadcrumb"><a href="index.html">Home</a> / Gallery</div>
        </div>
      </div>

      <p class="muted">Choose a category to view photos.</p>

      <div class="gallery-categories">
        <a class="gallery-card" href="camp.html">
          <div class="gallery-card-media" style="background-image:url('images/camp/c1.jpg');"></div>
          <div class="gallery-card-body">
            <div class="gallery-card-title">Camp</div>
            <div class="gallery-card-sub">40 photos</div>
          </div>
        </a>

        <a class="gallery-card" href="weekly.html">
          <div class="gallery-card-media" style="background-image:url('images/weekly/w1.jpg');"></div>
          <div class="gallery-card-body">
            <div class="gallery-card-title">Weekly Activities</div>
            <div class="gallery-card-sub">28 photos</div>
          </div>
        </a>

        <a class="gallery-card" href="events.html">
          <div class="gallery-card-media" style="background-image:url('images/events/e2.jpg');"></div>
          <div class="gallery-card-body">
            <div class="gallery-card-title">Events</div>
            <div class="gallery-card-sub">32 photos</div>
          </div>
        </a>

        <a class="gallery-card" href="field-trips.html">
          <div class="gallery-card-media" style="background-image:linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.65)), url('images/hero/scouts.jpg');"></div>
          <div class="gallery-card-body">
            <div class="gallery-card-title">Field Trips</div>
            <div class="gallery-card-sub">Coming soon</div>
          </div>
        </a>
      </div>

      <div class="cta-row" style="margin-top:18px;">
        <a class="btn ghost" href="index.html#top">Back to Home</a>
      </div>
    </div>
  </main>
</body>
</html>
