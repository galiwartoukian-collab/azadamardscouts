<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign Up | Azadamard Scouting</title>
    <meta name="description" content="Sign up to join Homenetmen Pasadena Azadamard Scouting" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html">
          <span class="mark" aria-hidden="true">⚜️</span>
          <span class="brand-text">
            <span class="brand-kicker">Homenetmen Pasadena</span>
            <span class="brand-title">Azadamard Scouting</span>
          </span>
        </a>

        <nav class="nav">
          <a href="index.html">Home</a>
          <a href="#">About</a>
          <a href="signup.html">Sign Up</a>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="container">
        <h2>Sign Up</h2>
        <p class="muted">Complete the form below to register interest. A leader will follow up.</p>

        <div class="card form-card">
          <form id="signupForm" novalidate>
            <div class="form-row">
              <label for="fullName">Full name</label>
              <input id="fullName" name="fullName" type="text" required />
              <div class="error" id="errFullName"></div>
            </div>

            <div class="form-row">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" required />
              <div class="error" id="errEmail"></div>
            </div>

            <div class="form-row">
              <label for="phone">Phone (optional)</label>
              <input id="phone" name="phone" type="tel" />
              <div class="error" id="errPhone"></div>
            </div>

            <div class="form-row">
              <label for="age">Scout age</label>
              <select id="age" name="age">
                <option value="">Select age group</option>
                <option>5–7</option>
                <option>8–10</option>
                <option>11–14</option>
                <option>15+</option>
              </select>
              <div class="error" id="errAge"></div>
            </div>

            <div class="form-row">
              <label for="password">Password</label>
              <input id="password" name="password" type="password" minlength="6" required />
              <div class="error" id="errPassword"></div>
            </div>

            <div class="form-row">
              <label for="confirm">Confirm password</label>
              <input id="confirm" name="confirm" type="password" required />
              <div class="error" id="errConfirm"></div>
            </div>

            <div class="form-row actions">
              <button class="btn primary" type="submit">Create account</button>
              <a class="btn ghost" href="index.html">Back</a>
            </div>
          </form>

          <div id="successMessage" class="muted" style="display:none;">
            Thank you — we received your request. A leader will contact you shortly.
          </div>
        </div>
      </div>
    </main>

    <script src="signup.js"></script>
  </body>
</html>
